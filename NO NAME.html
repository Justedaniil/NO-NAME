<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO NAME</title>

<style>
body {margin:0;font-family:Georgia;background:#faf8f6;}
header{text-align:center;padding:50px;background:linear-gradient(135deg,#f3e7e9,#e3eeff);}
h1{letter-spacing:8px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px;}
.product{background:white;padding:20px;border-radius:10px;text-align:center;}
button{padding:10px;border:1px solid black;cursor:pointer;}
.cart{position:fixed;top:20px;right:20px;background:black;color:white;padding:10px;border-radius:20px;}
</style>
</head>

<body>

<div class="cart">🛒 <span id="count">0</span></div>

<header>
<h1>NO NAME</h1>
<p>Fleurs apéritives élégantes</p>
</header>

<section class="products">

<div class="product">
<h3>Rose élégante</h3>
<p>10€</p>
<button onclick="add('Rose',10)">Ajouter</button>
</div>

<div class="product">
<h3>Violette</h3>
<p>12€</p>
<button onclick="add('Violette',12)">Ajouter</button>
</div>

</section>

<script>
let count = 0;

function add(name, price){
    count++;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
